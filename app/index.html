<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DevOps Dashboard</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #1a1a2e;
      color: #fff;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }

    .dashboard {
      display: grid;
      grid-template-columns: 1fr 1fr;
      grid-template-rows: 1fr 1fr;
      width: 100vw;
      height: 100vh;
      position: relative;
    }

    .card {
      padding: 24px 28px;
      overflow: hidden;
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 0.65rem;
      letter-spacing: 2px;
      opacity: 0.75;
      text-transform: uppercase;
    }

    /* News Card - Top Left */
    .news-card {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
    }
    .logo { font-size: 1.3rem; font-weight: bold; }
    .headline {
      font-size: 1.5rem;
      font-weight: 700;
      line-height: 1.3;
      margin-bottom: 12px;
    }
    .sub-headline { font-size: 0.8rem; opacity: 0.7; }

    /* Sports Card - Top Right */
    .sports-card {
      background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
    }
    .bbc-logo {
      background: #fff;
      color: #000;
      font-weight: bold;
      font-size: 0.7rem;
      padding: 2px 6px;
      border-radius: 3px;
      margin-left: auto;
    }
    .news-list { list-style: none; display: flex; flex-direction: column; gap: 8px; }
    .news-list li {
      font-size: 0.85rem;
      padding: 5px 0;
      border-bottom: 1px solid rgba(255,255,255,0.2);
    }

    /* Quote Card - Bottom Left */
    .quote-card {
      background: linear-gradient(135deg, #a18cd1 0%, #fbc2eb 100%);
      color: #1a1a2e;
    }
    .quote-card .card-header { color: #1a1a2e; opacity: 0.6; }
    blockquote {
      font-size: 1.4rem;
      font-weight: 600;
      line-height: 1.4;
      margin: 16px 0;
    }
    .author { font-size: 0.85rem; opacity: 0.6; }

    /* Pipeline Status Card - Bottom Right */
    .status-card {
      background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
      color: #1a1a2e;
    }
    .status-card .card-header { color: #1a1a2e; opacity: 0.6; }
    .dot {
      width: 8px; height: 8px;
      background: #00cc44;
      border-radius: 50%;
      display: inline-block;
      animation: pulse 1.5s infinite;
    }
    @keyframes pulse {
      0%,100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .city-temp {
      display: flex;
      align-items: baseline;
      gap: 12px;
      margin-bottom: 4px;
    }
    .city { font-size: 1.8rem; font-weight: 700; }
    .status-text { font-size: 1.6rem; font-weight: 700; color: #006600; }
