replicaCount: 2

image:
  repository: sathishsiddamsetty/webapp
  tag: "30"
  pullPolicy: Always

service:
  type: NodePort
  port: 80
  nodePort: 30090

readinessProbe:
  initialDelaySeconds: 5
  periodSeconds: 3

livenessProbe:
  initialDelaySeconds: 10
  periodSeconds: 10

revisionHistoryLimit: 3

strategy:
  maxSurge: 1
  maxUnavailable: 0
